# --- WRGB II LED ---
#
# Protocol afgeleid uit btsnoop HCI logs (2026-05-30):
#
# Connect:          AUTH(0x5a) → RTC → RTC  (lamp onthoudt schema zelf)
# Auto activeren:   MODE(RESET_AUTO) → MODE(0x05) → SCHEDULE(params)
# Auto deactiveren: SCHEDULE(delete: R/G/B=0xff) + MODE(0x28)  [2×]
# Manueel:          BRIGHTNESS per kanaal
# Manueel → auto:   MODE(RESET_AUTO) → MODE(0x05) → SCHEDULE
#
# SCHEDULE: hdr::DEVICE(0xa5), cmd=0x19
#   data: [aan_h, aan_m, uit_h, uit_m, ramp_min, weekdays=0x7f, R, G, B, 0xff×5]
#   Delete = R/G/B = 0xff
# BRIGHTNESS: hdr::BASE(0x5a), cmd=0x07, data=[kanaal, waarde]  (0=R, 1=G, 2=B)
#
# VERBINDING: niet-persistent — connect → init (schema of brightness) → disconnect
# Lamp onthoudt schema zelf via interne RTC; BLE alleen nodig bij schema-update.
#
# BELANGRIJK: sequence byte mag nooit 90 (=0x5a = frame header) zijn → next_seq()
# Ramp-waarde 90 min is ook verboden → wordt 89 min afgerond.

globals:
  - id: wrgb2_auto_modus
    type: bool
    restore_value: false
    initial_value: 'true'

  - id: wrgb2_device
    type: chihiros::WRGB2Device
    restore_value: false

ble_client:
  - mac_address: ${wrgb2_mac}
    id: chihiros_wrgb2
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(wrgb2_device).prepare(
              id(ntp_tijd).now(), id(wrgb2_auto_modus),
              id(fotoperiode_start).hour, id(fotoperiode_start).minute,
              id(fotoperiode_eind).hour,  id(fotoperiode_eind).minute,
              (uint8_t)id(wrgb2_ramp).state,
              (uint8_t)id(wrgb2_schema_rood).state,
              (uint8_t)id(wrgb2_schema_groen).state,
              (uint8_t)id(wrgb2_schema_blauw).state
            );
        - while:
            condition:
              lambda: return id(wrgb2_device).has_next();
            then:
              - ble_client.ble_write:
                  id: chihiros_wrgb2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(wrgb2_device).next();
              - delay: 200ms
        - switch.turn_off: wrgb2_verbinding
        - logger.log: "wrgb2: klaar"
    on_disconnect:
      then:
        - logger.log: "wrgb2: verbinding verbroken"

script:
  - id: wrgb2_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: wrgb2_verbinding

  # Alleen verbinden als in handmatige modus — voorkomt onnodige reconnects bij slider-wijzigingen
  - id: wrgb2_verbind_als_klaar_manueel
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden) && !id(wrgb2_auto_modus);
          then:
            - switch.turn_on: wrgb2_verbinding


switch:
  - platform: ble_client
    ble_client_id: chihiros_wrgb2
    id: wrgb2_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "WRGB2 auto modus"
    id: sw_wrgb2_auto
    icon: mdi:clock-outline
    restore_mode: ALWAYS_ON
    lambda: return id(wrgb2_auto_modus);
    turn_on_action:
      - globals.set:
          id: wrgb2_auto_modus
          value: 'true'
      - script.execute: wrgb2_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: wrgb2_auto_modus
          value: 'false'
      - script.execute: wrgb2_verbind_als_klaar

number:
  - platform: template
    name: "WRGB2 rood"
    id: num_wrgb2_r
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 groen"
    id: num_wrgb2_g
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 blauw"
    id: num_wrgb2_b
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 schema ramp"
    id: wrgb2_ramp
    min_value: 0
    max_value: 150
    step: 5
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: "min"
    icon: mdi:sun-angle

  - platform: template
    name: "WRGB2 schema rood"
    id: wrgb2_schema_rood
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 61
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

  - platform: template
    name: "WRGB2 schema groen"
    id: wrgb2_schema_groen
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 45
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

  - platform: template
    name: "WRGB2 schema blauw"
    id: wrgb2_schema_blauw
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 80
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

button:
  - platform: template
    name: "WRGB2 schema toepassen"
    id: btn_wrgb2_schema
    icon: mdi:clock-edit
    on_press:
      - script.execute: wrgb2_verbind_als_klaar

  - platform: template
    name: "WRGB2 RTC sync"
    id: btn_wrgb2_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - lambda: id(wrgb2_device).set_rtc_only();
      - script.execute: wrgb2_verbind_als_klaar

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_wrgb2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: wrgb2_notificatie
    name: "WRGB2 Notificatie"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("wrgb2", "Notificatie (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      return NAN;
