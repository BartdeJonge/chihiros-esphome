# --- WRGB II LED ---
#
# Anders dan CO2/roerder/ventilator: geen auth-volgorde nodig.
#
# Modi:
#   Manueel — R/G/B brightness direct via number entities (0-100%)
#   Auto    — intern schema in het apparaat (aan/uit tijd, ramp, piek-helderheid)
#
# Connect sequence (manueel): RTC → restore brightness
# Connect sequence (auto):    RTC → schema opnieuw sturen
#
# Schedule command: hdr::DEVICE, cmd::SCHEDULE
#   params: [aan_h, aan_m, uit_h, uit_m, ramp_min, weekdays=127, R, G, B, 0xff×5]
#   Delete = zelfde frame maar R/G/B = 0xff
#   Reset  = hdr::BASE, cmd::MODE, data=[RESET_SCHEMA, SKIP, SKIP]
#   Activeer = hdr::BASE, cmd::MODE, data=[RESET_AUTO, SKIP, SKIP] → dan RTC
#
# BELANGRIJK: sequence byte mag nooit 90 (=0x5a = frame header) zijn → next_seq()
# Ramp-waarde 90 min is ook verboden → wordt 89 min afgerond.

globals:
  - id: cmd_seq_wrgb2
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: wrgb2_auto_modus
    type: bool
    restore_value: true
    initial_value: 'false'

ble_client:
  - mac_address: ${wrgb2_mac}
    id: chihiros_wrgb2
    on_connect:
      then:
        - delay: 500ms
        - ble_client.ble_write:
            id: chihiros_wrgb2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              auto t = id(ha_time).now();
              ESP_LOGI("wrgb2", "RTC");
              return chihiros::rtc_pakket(t, chihiros::next_seq(id(cmd_seq_wrgb2)));
        - delay: 200ms
        - if:
            condition:
              lambda: return id(wrgb2_auto_modus);
            then:
              - script.execute: stuur_wrgb2_schema
              - script.wait: stuur_wrgb2_schema
            else:
              - script.execute: stuur_wrgb2_brightness
              - script.wait: stuur_wrgb2_brightness
        - logger.log: "WRGB2 verbonden"
    on_disconnect:
      then:
        - logger.log: "WRGB2 verbinding verbroken"

script:
  # Stuurt handmatige brightness voor alle 3 kanalen.
  # Gebruikt bij: manuele connect-restore en uitschakelen auto modus.
  - id: stuur_wrgb2_brightness
    then:
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            ESP_LOGI("wrgb2", "Brightness R=%d G=%d B=%d",
              (int)id(num_wrgb2_r).state, (int)id(num_wrgb2_g).state, (int)id(num_wrgb2_b).state);
            return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
              {chihiros::data::WRGB_R, (uint8_t)id(num_wrgb2_r).state},
              chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 100ms
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
              {chihiros::data::WRGB_G, (uint8_t)id(num_wrgb2_g).state},
              chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 100ms
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
              {chihiros::data::WRGB_B, (uint8_t)id(num_wrgb2_b).state},
              chihiros::next_seq(id(cmd_seq_wrgb2)));

  # Stuurt het schema naar het apparaat:
  #   1. Reset alle bestaande schema's
  #   2. Voeg nieuw schema toe (elke dag, met ramp)
  #   3. Schakel over naar auto modus
  #   4. RTC sync (device evalueert schema op huidig tijdstip)
  - id: stuur_wrgb2_schema
    then:
      # Stap 1: reset
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            ESP_LOGI("wrgb2", "Schema reset");
            return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::MODE,
              {chihiros::data::RESET_SCHEMA, chihiros::data::SKIP, chihiros::data::SKIP},
              chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Stap 2: schema toevoegen (weekdays=127 = elke dag)
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t aan_h = (uint8_t)id(wrgb2_aan_uur).state;
            uint8_t aan_m = (uint8_t)id(wrgb2_aan_min).state;
            uint8_t uit_h = (uint8_t)id(wrgb2_uit_uur).state;
            uint8_t uit_m = (uint8_t)id(wrgb2_uit_min).state;
            uint8_t ramp  = (uint8_t)id(wrgb2_ramp).state;
            if (ramp == 90) ramp = 89;  // 0x5a niet toegestaan in frame
            uint8_t r = (uint8_t)id(wrgb2_schema_rood).state;
            uint8_t g = (uint8_t)id(wrgb2_schema_groen).state;
            uint8_t b = (uint8_t)id(wrgb2_schema_blauw).state;
            ESP_LOGI("wrgb2", "Schema %02d:%02d->%02d:%02d ramp=%d R=%d G=%d B=%d",
              aan_h, aan_m, uit_h, uit_m, ramp, r, g, b);
            return chihiros::pakket(chihiros::hdr::DEVICE, chihiros::cmd::SCHEDULE,
              {aan_h, aan_m, uit_h, uit_m, ramp, 127, r, g, b,
               chihiros::data::SKIP, chihiros::data::SKIP, chihiros::data::SKIP,
               chihiros::data::SKIP, chihiros::data::SKIP},
              chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Stap 3: activeer auto modus
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            ESP_LOGI("wrgb2", "Auto modus activeren");
            return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::MODE,
              {chihiros::data::RESET_AUTO, chihiros::data::SKIP, chihiros::data::SKIP},
              chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Stap 4: RTC — device evalueert schema op huidig tijdstip
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            auto t = id(ha_time).now();
            return chihiros::rtc_pakket(t, chihiros::next_seq(id(cmd_seq_wrgb2)));

switch:
  - platform: ble_client
    ble_client_id: chihiros_wrgb2
    id: wrgb2_verbinding
    internal: true
    restore_mode: ALWAYS_ON

  # Auto modus schakelaar.
  # turn_on: stuurt schema naar apparaat en activeert auto modus.
  # turn_off: stuurt huidige handmatige brightness → apparaat gaat direct naar manueel.
  - platform: template
    name: "WRGB2 auto modus"
    id: sw_wrgb2_auto
    icon: mdi:clock-outline
    lambda: return id(wrgb2_auto_modus);
    turn_on_action:
      - lambda: id(wrgb2_auto_modus) = true;
      - script.execute: stuur_wrgb2_schema
    turn_off_action:
      - lambda: id(wrgb2_auto_modus) = false;
      - script.execute: stuur_wrgb2_brightness

number:
  # Handmatige brightness per kanaal (actief in manuele modus)
  - platform: template
    name: "WRGB2 rood"
    id: num_wrgb2_r
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      then:
        - ble_client.ble_write:
            id: chihiros_wrgb2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
                {chihiros::data::WRGB_R, (uint8_t)x},
                chihiros::next_seq(id(cmd_seq_wrgb2)));

  - platform: template
    name: "WRGB2 groen"
    id: num_wrgb2_g
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      then:
        - ble_client.ble_write:
            id: chihiros_wrgb2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
                {chihiros::data::WRGB_G, (uint8_t)x},
                chihiros::next_seq(id(cmd_seq_wrgb2)));

  - platform: template
    name: "WRGB2 blauw"
    id: num_wrgb2_b
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      then:
        - ble_client.ble_write:
            id: chihiros_wrgb2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              return chihiros::pakket(chihiros::hdr::BASE, chihiros::cmd::BRIGHTNESS,
                {chihiros::data::WRGB_B, (uint8_t)x},
                chihiros::next_seq(id(cmd_seq_wrgb2)));

button:
  - platform: template
    name: "WRGB2 schema toepassen"
    id: btn_wrgb2_schema
    icon: mdi:clock-edit
    on_press:
      - if:
          condition:
            switch.is_on: wrgb2_verbinding
          then:
            - script.execute: stuur_wrgb2_schema

sensor:
  # Schema-instellingen uit HA
  - platform: homeassistant
    id: wrgb2_aan_uur
    entity_id: input_datetime.aquarium_wrgb2_aan
    attribute: hour
  - platform: homeassistant
    id: wrgb2_aan_min
    entity_id: input_datetime.aquarium_wrgb2_aan
    attribute: minute
  - platform: homeassistant
    id: wrgb2_uit_uur
    entity_id: input_datetime.aquarium_wrgb2_uit
    attribute: hour
  - platform: homeassistant
    id: wrgb2_uit_min
    entity_id: input_datetime.aquarium_wrgb2_uit
    attribute: minute
  - platform: homeassistant
    id: wrgb2_ramp
    entity_id: input_number.aquarium_wrgb2_ramp
  - platform: homeassistant
    id: wrgb2_schema_rood
    entity_id: input_number.aquarium_wrgb2_schema_rood
  - platform: homeassistant
    id: wrgb2_schema_groen
    entity_id: input_number.aquarium_wrgb2_schema_groen
  - platform: homeassistant
    id: wrgb2_schema_blauw
    entity_id: input_number.aquarium_wrgb2_schema_blauw

  - platform: ble_client
    type: rssi
    ble_client_id: chihiros_wrgb2
    name: "WRGB2 RSSI"
    update_interval: 60s

  # Ruwe notificaties — log alle bytes om het frame-formaat te bevestigen na eerste connect
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_wrgb2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: wrgb2_notificatie
    name: "WRGB2 Notificatie"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("wrgb2", "Notificatie (%d bytes):", x.size());
      for (int i = 0; i < (int)x.size(); i++) ESP_LOGI("wrgb2", "  [%d] = 0x%02x (%d)", i, x[i], x[i]);
      return NAN;
