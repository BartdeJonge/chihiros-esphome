# --- WRGB II LED ---
#
# Protocol afgeleid uit btsnoop HCI logs (2026-05-30):
#
# Connect:          AUTH(0x5a) → RTC → RTC  (lamp onthoudt schema zelf)
# Auto activeren:   MODE(RESET_AUTO) → MODE(0x05) → SCHEDULE(params)
# Auto deactiveren: SCHEDULE(delete: R/G/B=0xff) + MODE(0x28)  [2×]
# Manueel:          BRIGHTNESS per kanaal
# Manueel → auto:   MODE(RESET_AUTO) → MODE(0x05) → SCHEDULE
#
# SCHEDULE: hdr::DEVICE(0xa5), cmd=0x19
#   data: [aan_h, aan_m, uit_h, uit_m, ramp_min, weekdays=0x7f, R, G, B, 0xff×5]
#   Delete = R/G/B = 0xff
# BRIGHTNESS: hdr::BASE(0x5a), cmd=0x07, data=[kanaal, waarde]  (0=R, 1=G, 2=B)
#
# VERBINDING: niet-persistent — connect → init (schema of brightness) → disconnect
# Lamp onthoudt schema zelf via interne RTC; BLE alleen nodig bij schema-update.
#
# BELANGRIJK: sequence byte mag nooit 90 (=0x5a = frame header) zijn → next_seq()
# Ramp-waarde 90 min is ook verboden → wordt 89 min afgerond.

globals:
  - id: cmd_seq_wrgb2
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: wrgb2_auto_modus
    type: bool
    restore_value: false
    initial_value: 'true'

ble_client:
  - mac_address: ${wrgb2_mac}
    id: chihiros_wrgb2
    on_connect:
      then:
        - delay: 500ms
        - if:
            condition:
              lambda: return !id(ha_verbonden);
            then:
              - logger.log: "wrgb2: HA nog niet verbonden, verbinding verbroken"
              - switch.turn_off: wrgb2_verbinding
            else:
              - logger.log: "wrgb2: Auth"
              - ble_client.ble_write:
                  id: chihiros_wrgb2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::auth(chihiros::next_seq(id(cmd_seq_wrgb2)));
              - delay: 200ms
              - if:
                  condition:
                    lambda: return id(ha_time).now().is_valid();
                  then:
                    - logger.log:
                        format: "wrgb2: RTC %04d-%02d-%02d (dow_raw=%d dow_pkt=%d) %02d:%02d:%02d"
                        args: ["id(ha_time).now().year", "id(ha_time).now().month", "id(ha_time).now().day_of_month",
                               "id(ha_time).now().day_of_week",
                               "(id(ha_time).now().day_of_week + 5) % 7 + 1",
                               "id(ha_time).now().hour", "id(ha_time).now().minute", "id(ha_time).now().second"]
                    - ble_client.ble_write:
                        id: chihiros_wrgb2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda |-
                          auto pkt = chihiros::rtc_pakket(id(ha_time).now(), chihiros::next_seq(id(cmd_seq_wrgb2)));
                          ESP_LOGI("wrgb2", "RTC bytes: %s", chihiros::hex_dump(pkt).c_str());
                          return pkt;
                    - delay: 200ms
                    - ble_client.ble_write:
                        id: chihiros_wrgb2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), chihiros::next_seq(id(cmd_seq_wrgb2)));
                  else:
                    - logger.log: "wrgb2: RTC OVERGESLAGEN — ha_time nog niet gesynchroniseerd"
              - if:
                  condition:
                    lambda: return id(wrgb2_auto_modus);
                  then:
                    - script.execute: stuur_wrgb2_schema
                    - script.wait: stuur_wrgb2_schema
                  else:
                    - script.execute: stuur_wrgb2_brightness
                    - script.wait: stuur_wrgb2_brightness
              - switch.turn_off: wrgb2_verbinding
              - logger.log: "wrgb2: init klaar, verbinding verbroken"
    on_disconnect:
      then:
        - logger.log: "wrgb2: verbinding verbroken"

script:
  - id: wrgb2_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: wrgb2_verbinding

  # Alleen verbinden als in handmatige modus — voorkomt onnodige reconnects bij slider-wijzigingen
  - id: wrgb2_verbind_als_klaar_manueel
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden) && !id(wrgb2_auto_modus);
          then:
            - switch.turn_on: wrgb2_verbinding

  # Stuurt helderheid per kanaal (R, G, B) — lamp past direct aan
  - id: stuur_wrgb2_brightness
    then:
      - logger.log:
          format: "wrgb2: brightness R=%d G=%d B=%d"
          args: ["(int)id(num_wrgb2_r).state", "(int)id(num_wrgb2_g).state", "(int)id(num_wrgb2_b).state"]
      - ble_client.ble_write:  # kanaal R (0)
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::wrgb_channel(chihiros::data::WRGB_R, (uint8_t)id(num_wrgb2_r).state, chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 100ms
      - ble_client.ble_write:  # kanaal G (1)
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::wrgb_channel(chihiros::data::WRGB_G, (uint8_t)id(num_wrgb2_g).state, chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 100ms
      - ble_client.ble_write:  # kanaal B (2)
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::wrgb_channel(chihiros::data::WRGB_B, (uint8_t)id(num_wrgb2_b).state, chihiros::next_seq(id(cmd_seq_wrgb2)));

  # Stuurt dagschema naar lamp: reset → nieuw schema → auto modus → RTC
  # Na de laatste RTC evalueert de lamp het schema direct op het huidige tijdstip
  - id: stuur_wrgb2_schema
    then:
      # Wis bestaand schema zodat we een schone lei hebben
      - logger.log: "wrgb2: schema reset"
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::reset_schema(chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Voeg schema toe: aan-tijd, uit-tijd, ramp (fade-tijd), weekdays=127 (elke dag), RGB
      # Ramp-waarde 90 is verboden (= 0x5a = frame-header) — wordt 89
      - logger.log:
          format: "wrgb2: schema %02d:%02d→%02d:%02d ramp=%d R=%d G=%d B=%d"
          args: ["id(fotoperiode_start).hour", "id(fotoperiode_start).minute", "id(fotoperiode_eind).hour", "id(fotoperiode_eind).minute", "(int)id(wrgb2_ramp).state", "(int)id(wrgb2_schema_rood).state", "(int)id(wrgb2_schema_groen).state", "(int)id(wrgb2_schema_blauw).state"]
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            return chihiros::wrgb_schedule(id(fotoperiode_start).hour, id(fotoperiode_start).minute, id(fotoperiode_eind).hour, id(fotoperiode_eind).minute, chihiros::wrgb2_ramp_veilig((uint8_t)id(wrgb2_ramp).state), 127, (uint8_t)id(wrgb2_schema_rood).state, (uint8_t)id(wrgb2_schema_groen).state, (uint8_t)id(wrgb2_schema_blauw).state, chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Zet lamp in auto modus — volgt voortaan het schema
      - logger.log: "wrgb2: auto modus activeren"
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::reset_auto(chihiros::next_seq(id(cmd_seq_wrgb2)));
      - delay: 200ms
      # Laatste RTC triggert schema-evaluatie — lamp zet zichzelf direct op de juiste stand
      - ble_client.ble_write:
          id: chihiros_wrgb2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), chihiros::next_seq(id(cmd_seq_wrgb2)));

switch:
  - platform: ble_client
    ble_client_id: chihiros_wrgb2
    id: wrgb2_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "WRGB2 auto modus"
    id: sw_wrgb2_auto
    icon: mdi:clock-outline
    restore_mode: ALWAYS_ON
    lambda: return id(wrgb2_auto_modus);
    turn_on_action:
      - globals.set:
          id: wrgb2_auto_modus
          value: 'true'
      - script.execute: wrgb2_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: wrgb2_auto_modus
          value: 'false'
      - script.execute: wrgb2_verbind_als_klaar

number:
  - platform: template
    name: "WRGB2 rood"
    id: num_wrgb2_r
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 groen"
    id: num_wrgb2_g
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 blauw"
    id: num_wrgb2_b
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: true
    icon: mdi:led-on
    unit_of_measurement: "%"
    optimistic: true
    on_value:
      - script.execute: wrgb2_verbind_als_klaar_manueel

  - platform: template
    name: "WRGB2 schema ramp"
    id: wrgb2_ramp
    min_value: 0
    max_value: 150
    step: 5
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: "min"
    icon: mdi:sun-angle

  - platform: template
    name: "WRGB2 schema rood"
    id: wrgb2_schema_rood
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 61
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

  - platform: template
    name: "WRGB2 schema groen"
    id: wrgb2_schema_groen
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 45
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

  - platform: template
    name: "WRGB2 schema blauw"
    id: wrgb2_schema_blauw
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 80
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:led-on

button:
  - platform: template
    name: "WRGB2 schema toepassen"
    id: btn_wrgb2_schema
    icon: mdi:clock-edit
    on_press:
      - script.execute: wrgb2_verbind_als_klaar

  - platform: template
    name: "WRGB2 RTC sync"
    id: btn_wrgb2_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - script.execute: wrgb2_verbind_als_klaar

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_wrgb2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: wrgb2_notificatie
    name: "WRGB2 Notificatie"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("wrgb2", "Notificatie (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      return NAN;
