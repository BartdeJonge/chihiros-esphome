# --- SAMENVATTING ---
# Chihiros BLE bridge — CO2 controller + magnetisch roerder + koelventilator + Doctor Mate + WRGB2
# Configuratie gesplitst in packages per device:
#   aquarium-ble-bridge-co2.yaml
#   aquarium-ble-bridge-roerder.yaml
#   aquarium-ble-bridge-ventilator.yaml
#   aquarium-ble-bridge-doctor.yaml
#   aquarium-ble-bridge-wrgb2.yaml

substitutions:
  name: aquarium-ble-bridge
  friendly_name: aquarium-ble-bridge
  # MAC-adressen
  co2_mac: "CC:A0:27:8E:79:E9"
  roerder_mac: "EC:DE:A6:A0:61:1D"
  ventilator_mac: "D7:65:2F:EF:CC:BB"
  doctor_mac: "CC:A0:E9:07:34:C6"
  wrgb2_mac:  "CF:20:3B:6D:17:C1"
  dosing_mac: "F1:C0:D0:B8:E9:5A"
  # Nordic UART Service UUIDs (gedeeld door alle Chihiros devices)
  ble_service: "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
  ble_tx: "6e400002-b5a3-f393-e0a9-e50e24dcca9e"
  ble_rx: "6e400003-b5a3-f393-e0a9-e50e24dcca9e"

external_components:
  - source:
      type: local
      path: components
    components: [chihiros_ble]

chihiros_ble:

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ACL_CONNECTIONS: "7"

wifi:
  ssid: !secret wifi_sid
  password: !secret wifi_password_iot
  fast_connect: enable
  power_save_mode: NONE
  post_connect_roaming: false
  reboot_timeout: 0s

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    esp32_ble_tracker: DEBUG
    ble_client: DEBUG

globals:
  - id: ha_verbonden
    type: bool
    restore_value: false
    initial_value: 'false'

api:
  encryption:
    key: !secret encryption_key
  on_client_connected:
    - if:
        condition:
          lambda: return !id(ha_verbonden);
        then:
          - lambda: id(ha_verbonden) = true;
          - if:
              condition:
                lambda: return strcmp("${wrgb2_mac}", "00:00:00:00:00:00") != 0;
              then:
                - switch.turn_on: wrgb2_verbinding
          - if:
              condition:
                lambda: return strcmp("${ventilator_mac}", "00:00:00:00:00:00") != 0;
              then:
                - switch.turn_on: ventilator_verbinding

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time
    timezone: CET-1CEST,M3.5.0,M10.5.0/3  # expliciete POSIX TZ voorkomt fout in IANA→POSIX conversie

esp32_ble:
  io_capability: none
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 60ms
    continuous: true
  on_ble_advertise:
    - then:
        - lambda: |-
            std::string name = x.get_name();
            std::string mac = x.address_str();
            if (name.rfind("DY", 0) != 0) return;
            if (mac == "${co2_mac}" || mac == "${roerder_mac}" ||
                mac == "${ventilator_mac}" || mac == "${doctor_mac}" ||
                mac == "${wrgb2_mac}" || mac == "${dosing_mac}") return;
            // Identificeer apparaattype uit naam-prefix (DY{type}{MAC_zonder_dubbele_punten})
            const char* type = "Unknown type";
            if      (name.rfind("DYNT90", 0) == 0) type = "WRGB2 light         -> set as wrgb2_mac";
            else if (name.rfind("DYPCO2", 0) == 0) type = "CO2 controller      -> set as co2_mac";
            else if (name.rfind("DYMIX",  0) == 0) type = "Magnetic stirrer    -> set as roerder_mac";
            else if (name.rfind("DYNFAN", 0) == 0) type = "Cooling fan         -> set as ventilator_mac";
            else if (name.rfind("DYNDOC", 0) == 0) type = "Doctor Mate         -> set as doctor_mac";
            else if (name.rfind("DYDOSE", 0) == 0) type = "Dosing pump         -> set as dosing_mac";
            ESP_LOGI("ble_scan", "Chihiros found: %s | MAC=%s RSSI=%d",
              type, mac.c_str(), x.get_rssi());

packages:
  schema:     !include aquarium-ble-bridge-schema.yaml
  roerder:    !include aquarium-ble-bridge-roerder.yaml
  ventilator: !include aquarium-ble-bridge-ventilator.yaml
  doctor:     !include aquarium-ble-bridge-doctor.yaml
  wrgb2:      !include aquarium-ble-bridge-wrgb2.yaml
  co2:        !include aquarium-ble-bridge-co2.yaml
  dosing:     !include aquarium-ble-bridge-dosing.yaml
