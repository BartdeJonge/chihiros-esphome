# --- MAGNETISCH ROERDER ---
#
# De Chihiros magnetische roerder heeft 4 onafhankelijke kanalen (0-3).
# Elk kanaal heeft een snelheid (0-100%), een aan-tijd (minuten) en een interval (minuten).
#
# Verbindingsvolgorde bij elke BLE-connect:
#   1. Auth       — meldt ons aan bij het apparaat
#   2. RTC sync   — synchroniseert de interne klok van de roerder
#   3. Config     — stuurt snelheid + timer per kanaal, gevolgd door "apply"
#   4. Staat      — herstelt welke kanalen aan/uit moeten staan
#
# Waarom globals voor aan/uit staat?
#   De ESP32 crasht regelmatig door BLE-stack druk (meerdere clients + scanner).
#   Na een crash en herstart stuurt ESPHome de huidige switch-staat naar HA.
#   Met restore_value:true worden de globals uit flash hersteld, zodat de
#   lambda: return id(roerder_kX_aan) de juiste staat teruggeeft aan HA —
#   ook als de ESP32 net herstart is.

globals:
  - id: cmd_seq_roerder
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: roerder_k0_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k1_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k2_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k3_aan
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: roerder_rtc_only
    type: bool
    restore_value: false
    initial_value: 'false'

ble_client:
  - mac_address: ${roerder_mac}
    id: chihiros_roerder
    on_connect:
      then:
        - delay: 500ms
        # Verplichte Chihiros-handshake
        - logger.log: "roerder: Auth"
        - ble_client.ble_write:
            id: chihiros_roerder
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda return chihiros::auth(id(cmd_seq_roerder)++);
        - delay: 200ms
        - if:
            condition:
              lambda: return id(roerder_rtc_only);
            then:
              # RTC sync only — geen config
              - logger.log:
                  format: "roerder: RTC sync %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ha_time).now().year", "id(ha_time).now().month", "id(ha_time).now().day_of_month", "id(ha_time).now().hour", "id(ha_time).now().minute", "id(ha_time).now().second"]
              - ble_client.ble_write:
                  id: chihiros_roerder
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), id(cmd_seq_roerder)++);
              - delay: 200ms
              - lambda: id(roerder_rtc_only) = false;
              - switch.turn_off: roerder_verbinding
              - logger.log: "roerder: RTC sync klaar"
            else:
              # Volledige config: RTC → config per kanaal → staat herstel
              # Klok synchroniseren — roerder gebruikt RTC voor zijn timer-schema
              - logger.log:
                  format: "roerder: RTC %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ha_time).now().year", "id(ha_time).now().month", "id(ha_time).now().day_of_month", "id(ha_time).now().hour", "id(ha_time).now().minute", "id(ha_time).now().second"]
              - ble_client.ble_write:
                  id: chihiros_roerder
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), id(cmd_seq_roerder)++);
              - delay: 200ms
              - script.execute: stuur_roerder_config
              - script.wait: stuur_roerder_config
              - delay: 200ms
              - switch.turn_off: roerder_verbinding
              - logger.log: "roerder: instellingen verstuurd, verbinding verbroken"
    on_disconnect:
      then:
        - logger.log: "roerder: verbinding verbroken"

script:
  # Stuurt drie writes per kanaal: activeren, snelheid, timer
  - id: stuur_kanaal_config
    parameters:
      kanaal: int
    then:
      # Meldt het kanaal aan bij het apparaat
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_enable((uint8_t)kanaal, id(cmd_seq_roerder)++);
      - delay: 100ms
      # Snelheid: 0-100% (HA) → 0-127 (apparaat-schaal)
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            float spd[] = {id(roerder_k0_snelheid).state, id(roerder_k1_snelheid).state,
                           id(roerder_k2_snelheid).state, id(roerder_k3_snelheid).state};
            return chihiros::stir_speed_pct((uint8_t)kanaal, spd[kanaal], id(cmd_seq_roerder)++);
      - delay: 100ms
      # Timer: duur (minuten aan) en interval (minuten tussen cycli)
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t dur[] = {(uint8_t)id(roerder_k0_duur).state, (uint8_t)id(roerder_k1_duur).state,
                             (uint8_t)id(roerder_k2_duur).state, (uint8_t)id(roerder_k3_duur).state};
            uint8_t ivl[] = {(uint8_t)id(roerder_k0_interval).state, (uint8_t)id(roerder_k1_interval).state,
                             (uint8_t)id(roerder_k2_interval).state, (uint8_t)id(roerder_k3_interval).state};
            return chihiros::stir_timer((uint8_t)kanaal, dur[kanaal], ivl[kanaal], id(cmd_seq_roerder)++);
      - delay: 100ms

  # Herstel welke kanalen aan/uit staan — alle 4 in één write (0xff = niet aanraken)
  - id: herstel_roerder_staat
    then:
      - logger.log:
          format: "roerder: herstel K0=%d K1=%d K2=%d K3=%d"
          args: ["(int)id(roerder_k0_aan)", "(int)id(roerder_k1_aan)", "(int)id(roerder_k2_aan)", "(int)id(roerder_k3_aan)"]
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_restore((uint8_t)id(roerder_k0_aan), (uint8_t)id(roerder_k1_aan), (uint8_t)id(roerder_k2_aan), (uint8_t)id(roerder_k3_aan), id(cmd_seq_roerder)++);

  # Volledige initialisatie: config voor alle 4 kanalen → apply → staat-herstel
  - id: stuur_roerder_config
    then:
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 0
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 1
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 2
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 3
      - script.wait: stuur_kanaal_config
      # Apply slaat de instellingen op in het apparaat
      - logger.log: "roerder: config toegepast"
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_apply(id(cmd_seq_roerder)++);
      - delay: 100ms
      - script.execute: herstel_roerder_staat
      - script.wait: herstel_roerder_staat

switch:
  - platform: ble_client
    ble_client_id: chihiros_roerder
    id: roerder_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Roerder kanaal 0"
    id: roerder_sw_k0
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k0_aan);
    turn_on_action:
      - lambda: id(roerder_k0_aan) = true;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding
    turn_off_action:
      - lambda: id(roerder_k0_aan) = false;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding

  - platform: template
    name: "Roerder kanaal 1"
    id: roerder_sw_k1
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k1_aan);
    turn_on_action:
      - lambda: id(roerder_k1_aan) = true;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding
    turn_off_action:
      - lambda: id(roerder_k1_aan) = false;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding

  - platform: template
    name: "Roerder kanaal 2"
    id: roerder_sw_k2
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k2_aan);
    turn_on_action:
      - lambda: id(roerder_k2_aan) = true;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding
    turn_off_action:
      - lambda: id(roerder_k2_aan) = false;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding

  - platform: template
    name: "Roerder kanaal 3"
    id: roerder_sw_k3
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k3_aan);
    turn_on_action:
      - lambda: id(roerder_k3_aan) = true;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding
    turn_off_action:
      - lambda: id(roerder_k3_aan) = false;
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - switch.turn_on: roerder_verbinding

button:
  - platform: template
    name: "Roerder config toepassen"
    id: btn_roerder_config
    icon: mdi:content-save-cog
    on_press:
      - script.execute: stuur_roerder_config

  - platform: template
    name: "Roerder RTC sync"
    id: btn_roerder_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - if:
          condition:
            lambda: return id(co2_boot_klaar);
          then:
            - lambda: id(roerder_rtc_only) = true;
            - switch.turn_on: roerder_verbinding

number:
  - platform: template
    id: roerder_k0_snelheid
    name: "Roerder kanaal 0 snelheid"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:speedometer

  - platform: template
    id: roerder_k0_duur
    name: "Roerder kanaal 0 duur"
    min_value: 1
    max_value: 60
    step: 1
