# --- MAGNETISCH ROERDER ---
#
# De Chihiros magnetische roerder heeft 4 onafhankelijke kanalen (0-3).
# Elk kanaal heeft:
#   - snelheid (0-20, app-schaal) → CMD_2A byte[3]
#   - voorlooptijd (seconden) → CMD_2A byte[2]: roerder start X sec vóór begintijd
#   - begintijd (uur + minuut) → STIR_TIMER mode 3 byte[2/3]
#   - duur (seconden) → STIR_TIMER mode 3 byte[5]
#   - weekdays → STIR_SPEED byte[1], altijd 0x7f (elke dag)
#
# Verbindingsvolgorde bij elke BLE-connect:
#   1. Auth       — meldt ons aan bij het apparaat
#   2. RTC sync   — synchroniseert de interne klok van de roerder
#   3. Config     — STIR_ENABLE + STIR_SPEED(weekdays) + CMD_2A + STIR_TIMER per kanaal → APPLY
#   4. Staat      — herstelt welke kanalen aan/uit moeten staan (STIR_TOGGLE)
#
# Waarom globals voor aan/uit staat?
#   De ESP32 crasht regelmatig door BLE-stack druk (meerdere clients + scanner).
#   Na een crash en herstart stuurt ESPHome de huidige switch-staat naar HA.
#   Met restore_value:true worden de globals uit flash hersteld, zodat de
#   lambda: return id(roerder_kX_aan) de juiste staat teruggeeft aan HA —
#   ook als de ESP32 net herstart is.

globals:
  - id: cmd_seq_roerder
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: roerder_k0_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k1_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k2_aan
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: roerder_k3_aan
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: roerder_rtc_only
    type: bool
    restore_value: false
    initial_value: 'false'

ble_client:
  - mac_address: ${roerder_mac}
    id: chihiros_roerder
    on_connect:
      then:
        - delay: 500ms
        # Verplichte Chihiros-handshake
        - logger.log: "roerder: Auth"
        - ble_client.ble_write:
            id: chihiros_roerder
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda return chihiros::auth(id(cmd_seq_roerder)++);
        - delay: 200ms
        - if:
            condition:
              lambda: return id(roerder_rtc_only);
            then:
              # RTC sync only — geen config
              - logger.log:
                  format: "roerder: RTC sync %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ntp_tijd).now().year", "id(ntp_tijd).now().month", "id(ntp_tijd).now().day_of_month", "id(ntp_tijd).now().hour", "id(ntp_tijd).now().minute", "id(ntp_tijd).now().second"]
              - ble_client.ble_write:
                  id: chihiros_roerder
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ntp_tijd).now(), id(cmd_seq_roerder)++);
              - delay: 200ms
              - globals.set:
                  id: roerder_rtc_only
                  value: 'false'
              - switch.turn_off: roerder_verbinding
              - logger.log: "roerder: RTC sync klaar"
            else:
              # Volledige config: RTC → config per kanaal → staat herstel
              - logger.log:
                  format: "roerder: RTC %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ntp_tijd).now().year", "id(ntp_tijd).now().month", "id(ntp_tijd).now().day_of_month", "id(ntp_tijd).now().hour", "id(ntp_tijd).now().minute", "id(ntp_tijd).now().second"]
              - ble_client.ble_write:
                  id: chihiros_roerder
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ntp_tijd).now(), id(cmd_seq_roerder)++);
              - delay: 200ms
              - script.execute: stuur_roerder_config
              - script.wait: stuur_roerder_config
              - delay: 200ms
              - switch.turn_off: roerder_verbinding
              - logger.log: "roerder: instellingen verstuurd, verbinding verbroken"
    on_disconnect:
      then:
        - logger.log: "roerder: verbinding verbroken"

script:
  - id: roerder_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: roerder_verbinding

  # Stuurt 4 writes per kanaal: weekdays, CMD_2A, timer, activeren
  - id: stuur_kanaal_config
    parameters:
      kanaal: int
    then:
      # Kanaal activeren
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_enable((uint8_t)kanaal, id(cmd_seq_roerder)++);
      - delay: 100ms
      # Weekdays: altijd 0x7f (elke dag) — STIR_SPEED byte[1] = weekdays bitmask
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_weekdays((uint8_t)kanaal, 0x7f, id(cmd_seq_roerder)++);
      - delay: 100ms
      # CMD_2A: voorlooptijd (sec) + snelheid (0-20) — snelheid zowel schema als Run
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t spd[]  = {(uint8_t)id(roerder_k0_snelheid).state,  (uint8_t)id(roerder_k1_snelheid).state,
                              (uint8_t)id(roerder_k2_snelheid).state,  (uint8_t)id(roerder_k3_snelheid).state};
            uint8_t vrlp[] = {(uint8_t)id(roerder_k0_voorloop).state,  (uint8_t)id(roerder_k1_voorloop).state,
                              (uint8_t)id(roerder_k2_voorloop).state,  (uint8_t)id(roerder_k3_voorloop).state};
            return chihiros::stir_schema((uint8_t)kanaal, vrlp[kanaal], spd[kanaal], id(cmd_seq_roerder)++);
      - delay: 100ms
      # STIR_TIMER mode 3: dagelijks klokschema op begintijd, duur in seconden
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t uur[]  = {(uint8_t)id(roerder_k0_start_uur).state,  (uint8_t)id(roerder_k1_start_uur).state,
                              (uint8_t)id(roerder_k2_start_uur).state,  (uint8_t)id(roerder_k3_start_uur).state};
            uint8_t min[]  = {(uint8_t)id(roerder_k0_start_min).state,  (uint8_t)id(roerder_k1_start_min).state,
                              (uint8_t)id(roerder_k2_start_min).state,  (uint8_t)id(roerder_k3_start_min).state};
            uint8_t dur[]  = {(uint8_t)id(roerder_k0_duur).state,       (uint8_t)id(roerder_k1_duur).state,
                              (uint8_t)id(roerder_k2_duur).state,        (uint8_t)id(roerder_k3_duur).state};
            return chihiros::stir_timer((uint8_t)kanaal, uur[kanaal], min[kanaal], dur[kanaal], id(cmd_seq_roerder)++);
      - delay: 100ms

  # Herstel welke kanalen aan/uit staan — alle 4 in één write (0xff = niet aanraken)
  - id: herstel_roerder_staat
    then:
      - logger.log:
          format: "roerder: herstel K0=%d K1=%d K2=%d K3=%d"
          args: ["(int)id(roerder_k0_aan)", "(int)id(roerder_k1_aan)", "(int)id(roerder_k2_aan)", "(int)id(roerder_k3_aan)"]
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_restore((uint8_t)id(roerder_k0_aan), (uint8_t)id(roerder_k1_aan), (uint8_t)id(roerder_k2_aan), (uint8_t)id(roerder_k3_aan), id(cmd_seq_roerder)++);

  # Volledige initialisatie: config voor alle 4 kanalen → apply → staat-herstel
  - id: stuur_roerder_config
    then:
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 0
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 1
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 2
      - script.wait: stuur_kanaal_config
      - script.execute:
          id: stuur_kanaal_config
          kanaal: 3
      - script.wait: stuur_kanaal_config
      # Apply slaat de instellingen op in het apparaat
      - logger.log: "roerder: config toegepast"
      - ble_client.ble_write:
          id: chihiros_roerder
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda return chihiros::stir_apply(id(cmd_seq_roerder)++);
      - delay: 100ms
      - script.execute: herstel_roerder_staat
      - script.wait: herstel_roerder_staat

switch:
  - platform: ble_client
    ble_client_id: chihiros_roerder
    id: roerder_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Roerder kanaal 0"
    id: roerder_sw_k0
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k0_aan);
    turn_on_action:
      - globals.set:
          id: roerder_k0_aan
          value: 'true'
      - script.execute: roerder_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: roerder_k0_aan
          value: 'false'
      - script.execute: roerder_verbind_als_klaar

  - platform: template
    name: "Roerder kanaal 1"
    id: roerder_sw_k1
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k1_aan);
    turn_on_action:
      - globals.set:
          id: roerder_k1_aan
          value: 'true'
      - script.execute: roerder_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: roerder_k1_aan
          value: 'false'
      - script.execute: roerder_verbind_als_klaar

  - platform: template
    name: "Roerder kanaal 2"
    id: roerder_sw_k2
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k2_aan);
    turn_on_action:
      - globals.set:
          id: roerder_k2_aan
          value: 'true'
      - script.execute: roerder_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: roerder_k2_aan
          value: 'false'
      - script.execute: roerder_verbind_als_klaar

  - platform: template
    name: "Roerder kanaal 3"
    id: roerder_sw_k3
    icon: mdi:rotate-3d-variant
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(roerder_k3_aan);
    turn_on_action:
      - globals.set:
          id: roerder_k3_aan
          value: 'true'
      - script.execute: roerder_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: roerder_k3_aan
          value: 'false'
      - script.execute: roerder_verbind_als_klaar

button:
  - platform: template
    name: "Roerder config toepassen"
    id: btn_roerder_config
    icon: mdi:content-save-cog
    on_press:
      - script.execute: stuur_roerder_config

  - platform: template
    name: "Roerder RTC sync"
    id: btn_roerder_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - globals.set:
          id: roerder_rtc_only
          value: 'true'
      - script.execute: roerder_verbind_als_klaar

