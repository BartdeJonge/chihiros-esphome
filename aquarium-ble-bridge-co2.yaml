# --- CO2 CONTROLLER ---

#
# Protocol afgeleid uit btsnoop HCI logs (2026-05-30):
#
# Connect:   AUTH → RTC → RTC → RESET_SCHEMA → start→ON → end→OFF
# Activeren: RESET_SCHEMA → start→ON → end→OFF
# Deactiveren: start→EMPTY → end→EMPTY
#
# LET OP: de CO2-klep klikt fysiek bij elke connect (RESET_SCHEMA triggert actuatie).
# Verbind daarom alleen als het echt nodig is — niet periodiek pollen.
#
# RESET_SCHEMA wist alle slots in het apparaat — geen old-waarden nodig bij tijdwijziging.
# RTC wordt twee keer gestuurd (conform app-gedrag).

globals:
  - id: co2_schema_actief
    type: bool
    restore_value: true
    initial_value: 'true'

  - id: co2_device
    type: chihiros::CO2Device
    restore_value: false

ble_client:
  - mac_address: ${co2_mac}
    id: chihiros_co2
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(co2_device).prepare(
              id(ntp_tijd).now(), id(co2_schema_actief),
              id(fotoperiode_start).hour, id(fotoperiode_start).minute,
              id(fotoperiode_eind).hour,  id(fotoperiode_eind).minute,
              (int)id(co2_prestart).state
            );
        - while:
            condition:
              lambda: return id(co2_device).has_next();
            then:
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(co2_device).next();
              - delay: 200ms
        - switch.turn_off: co2_verbinding
        - logger.log: "co2: klaar"
    on_disconnect:
      then:
        - logger.log: "co2: verbinding verbroken"

script:
  - id: co2_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: co2_verbinding

switch:
  - platform: ble_client
    ble_client_id: chihiros_co2
    id: co2_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "CO2 schema actief"
    id: sw_co2_schema_actief
    icon: mdi:molecule-co2
    restore_mode: RESTORE_DEFAULT_ON
    lambda: return id(co2_schema_actief);
    turn_on_action:
      - globals.set:
          id: co2_schema_actief
          value: 'true'
      - script.execute: co2_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: co2_schema_actief
          value: 'false'
      - script.execute: co2_verbind_als_klaar

button:
  - platform: template
    name: "CO2 schema versturen"
    id: btn_co2_schema
    icon: mdi:molecule-co2
    on_press:
      - script.execute: co2_verbind_als_klaar

  - platform: template
    name: "CO2 RTC sync"
    id: btn_co2_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - lambda: id(co2_device).set_rtc_only();
      - script.execute: co2_verbind_als_klaar

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_co2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: co2_status_raw
    name: "CO2 Status"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("co2", "Notificatie: %s", chihiros::hex_dump(x).c_str());
      if (x.size() >= 7) return (float)x[6];
      return NAN;
