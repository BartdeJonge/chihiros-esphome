# --- CO2 CONTROLLER ---

esp32_ble_tracker:
  on_ble_advertise:
    - mac_address: ${co2_mac}
      then:
        - lambda: ESP_LOGI("co2", "CO2 controller gevonden! RSSI=%d", x.get_rssi());
#
# Protocol afgeleid uit btsnoop HCI logs (2026-05-30):
#
# Connect:   AUTH → RTC → RTC → RESET_SCHEMA → start→ON → end→OFF
# Activeren: RESET_SCHEMA → start→ON → end→OFF
# Deactiveren: start→EMPTY → end→EMPTY
#
# LET OP: de CO2-klep klikt fysiek bij elke connect (RESET_SCHEMA triggert actuatie).
# Verbind daarom alleen als het echt nodig is — niet periodiek pollen.
#
# RESET_SCHEMA wist alle slots in het apparaat — geen old-waarden nodig bij tijdwijziging.
# RTC wordt twee keer gestuurd (conform app-gedrag).

globals:
  - id: cmd_seq_co2
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: co2_schema_actief
    type: bool
    restore_value: true
    initial_value: 'true'

  - id: co2_rtc_only
    type: bool
    restore_value: false
    initial_value: 'false'

ble_client:
  - mac_address: ${co2_mac}
    id: chihiros_co2
    on_connect:
      then:
        - delay: 500ms
        # Verplichte Chihiros-handshake — apparaat weigert commando's zonder auth
        - logger.log: "co2: Auth"
        - ble_client.ble_write:
            id: chihiros_co2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda return chihiros::auth(id(cmd_seq_co2)++);
        - delay: 200ms
        - if:
            condition:
              lambda: return id(co2_rtc_only);
            then:
              # RTC sync only — geen config
              - logger.log:
                  format: "co2: RTC sync %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ha_time).now().year", "id(ha_time).now().month", "id(ha_time).now().day_of_month", "id(ha_time).now().hour", "id(ha_time).now().minute", "id(ha_time).now().second"]
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), id(cmd_seq_co2)++);
              - delay: 200ms
              - globals.set:
                  id: co2_rtc_only
                  value: 'false'
              - switch.turn_off: co2_verbinding
              - logger.log: "co2: RTC sync klaar"
            else:
              # Volledige config: RTC ×2 → schema reset → tijdslots
              - logger.log:
                  format: "co2: RTC %04d-%02d-%02d %02d:%02d:%02d"
                  args: ["id(ha_time).now().year", "id(ha_time).now().month", "id(ha_time).now().day_of_month", "id(ha_time).now().hour", "id(ha_time).now().minute", "id(ha_time).now().second"]
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), id(cmd_seq_co2)++);
              - delay: 200ms
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::rtc_pakket(id(ha_time).now(), id(cmd_seq_co2)++);
              - delay: 200ms
              # Wist alle tijdslots in het apparaat — zodat we een schone lei hebben
              - logger.log: "co2: reset schema"
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return chihiros::reset_schema(id(cmd_seq_co2)++);
              - delay: 200ms
              - if:
                  condition:
                    lambda: return id(co2_schema_actief);
                  then:
                    # Schema actief: CO2 aan op fotoperiode_start - co2_prestart, uit op fotoperiode_eind
                    - logger.log:
                        format: "co2: start fotoperiode %02d:%02d - %d min → ON"
                        args: ["id(fotoperiode_start).hour", "id(fotoperiode_start).minute", "(int)id(co2_prestart).state"]
                    - ble_client.ble_write:
                        id: chihiros_co2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda |-
                          int total = chihiros::co2_start_minuten(id(fotoperiode_start).hour, id(fotoperiode_start).minute, (int)id(co2_prestart).state);
                          return chihiros::co2_schema(total / 60, total % 60, chihiros::data::CO2_ON, id(cmd_seq_co2)++);
                    - delay: 100ms
                    - logger.log:
                        format: "co2: eind %02d:%02d → OFF"
                        args: ["id(fotoperiode_eind).hour", "id(fotoperiode_eind).minute"]
                    - ble_client.ble_write:
                        id: chihiros_co2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda return chihiros::co2_schema(id(fotoperiode_eind).hour, id(fotoperiode_eind).minute, chihiros::data::CO2_OFF, id(cmd_seq_co2)++);
                  else:
                    # Schema inactief: stuur EMPTY-slots zodat apparaat geen CO2 opent
                    - logger.log: "co2: schema deactiveren (EMPTY)"
                    - ble_client.ble_write:
                        id: chihiros_co2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda |-
                          int total = chihiros::co2_start_minuten(id(fotoperiode_start).hour, id(fotoperiode_start).minute, (int)id(co2_prestart).state);
                          return chihiros::co2_schema(total / 60, total % 60, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
                    - delay: 100ms
                    - ble_client.ble_write:
                        id: chihiros_co2
                        service_uuid: ${ble_service}
                        characteristic_uuid: ${ble_tx}
                        value: !lambda return chihiros::co2_schema(id(fotoperiode_eind).hour, id(fotoperiode_eind).minute, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
              - delay: 200ms
              - switch.turn_off: co2_verbinding
              - logger.log: "co2: instellingen verstuurd, verbinding verbroken"
    on_disconnect:
      then:
        - logger.log: "co2: verbinding verbroken"

script:
  - id: co2_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: co2_verbinding

switch:
  - platform: ble_client
    ble_client_id: chihiros_co2
    id: co2_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "CO2 schema actief"
    id: sw_co2_schema_actief
    icon: mdi:molecule-co2
    restore_mode: RESTORE_DEFAULT_ON
    lambda: return id(co2_schema_actief);
    turn_on_action:
      - globals.set:
          id: co2_schema_actief
          value: 'true'
      - script.execute: co2_verbind_als_klaar
    turn_off_action:
      - globals.set:
          id: co2_schema_actief
          value: 'false'
      - script.execute: co2_verbind_als_klaar

button:
  - platform: template
    name: "CO2 schema versturen"
    id: btn_co2_schema
    icon: mdi:molecule-co2
    on_press:
      - script.execute: co2_verbind_als_klaar

  - platform: template
    name: "CO2 RTC sync"
    id: btn_co2_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - globals.set:
          id: co2_rtc_only
          value: 'true'
      - script.execute: co2_verbind_als_klaar

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_co2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: co2_status_raw
    name: "CO2 Status"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("co2", "Notificatie: %s", chihiros::hex_dump(x).c_str());
      if (x.size() >= 7) return (float)x[6];
      return NAN;
