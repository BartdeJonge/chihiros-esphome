# --- CO2 CONTROLLER ---
#
# Protocol afgeleid uit btsnoop HCI logs (2026-05-30):
#
# Connect:   AUTH → RTC → RTC → RESET_SCHEMA → start→ON → end→OFF
# Activeren: RESET_SCHEMA → start→ON → end→OFF
# Deactiveren: start→EMPTY → end→EMPTY
#
# RESET_SCHEMA wist alle slots in het apparaat — geen old-waarden nodig bij tijdwijziging.
# RTC wordt twee keer gestuurd (conform app-gedrag).

globals:
  - id: cmd_seq_co2
    type: uint8_t
    restore_value: false
    initial_value: '1'

  - id: co2_schema_actief
    type: bool
    restore_value: true
    initial_value: 'true'

ble_client:
  - mac_address: ${co2_mac}
    id: chihiros_co2
    on_connect:
      then:
        - delay: 500ms
        - ble_client.ble_write:
            id: chihiros_co2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              ESP_LOGI("co2", "Auth");
              return chihiros::auth(id(cmd_seq_co2)++);
        - delay: 200ms
        - ble_client.ble_write:
            id: chihiros_co2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              auto t = id(ha_time).now();
              ESP_LOGI("co2", "RTC %04d-%02d-%02d %02d:%02d:%02d", t.year, t.month, t.day_of_month, t.hour, t.minute, t.second);
              return chihiros::rtc_pakket(t, id(cmd_seq_co2)++);
        - delay: 200ms
        - ble_client.ble_write:
            id: chihiros_co2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              auto t = id(ha_time).now();
              return chihiros::rtc_pakket(t, id(cmd_seq_co2)++);
        - delay: 200ms
        - ble_client.ble_write:
            id: chihiros_co2
            service_uuid: ${ble_service}
            characteristic_uuid: ${ble_tx}
            value: !lambda |-
              ESP_LOGI("co2", "RESET_SCHEMA");
              return chihiros::reset_schema(id(cmd_seq_co2)++);
        - delay: 200ms
        - if:
            condition:
              lambda: return id(co2_schema_actief);
            then:
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda |-
                    uint8_t h = (uint8_t)id(co2_start_uur).state;
                    uint8_t m = (uint8_t)id(co2_start_min).state;
                    ESP_LOGI("co2", "Connect: start %02d:%02d → ON", h, m);
                    return chihiros::co2_schema(h, m, chihiros::data::CO2_ON, id(cmd_seq_co2)++);
              - delay: 100ms
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda |-
                    uint8_t h = (uint8_t)id(co2_eind_uur).state;
                    uint8_t m = (uint8_t)id(co2_eind_min).state;
                    ESP_LOGI("co2", "Connect: eind %02d:%02d → OFF", h, m);
                    return chihiros::co2_schema(h, m, chihiros::data::CO2_OFF, id(cmd_seq_co2)++);
            else:
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda |-
                    uint8_t h = (uint8_t)id(co2_start_uur).state;
                    uint8_t m = (uint8_t)id(co2_start_min).state;
                    ESP_LOGI("co2", "Connect: start %02d:%02d → EMPTY (inactief)", h, m);
                    return chihiros::co2_schema(h, m, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
              - delay: 100ms
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda |-
                    uint8_t h = (uint8_t)id(co2_eind_uur).state;
                    uint8_t m = (uint8_t)id(co2_eind_min).state;
                    ESP_LOGI("co2", "Connect: eind %02d:%02d → EMPTY (inactief)", h, m);
                    return chihiros::co2_schema(h, m, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
        - logger.log: "CO2 verbonden"
    on_disconnect:
      then:
        - logger.log: "CO2 verbinding verbroken"

script:
  # Stuurt schema naar apparaat — RESET_SCHEMA wist alle bestaande slots.
  # Geen old-waarden nodig: alle slots worden geleegd voor het instellen.
  - id: stuur_schema
    then:
      - ble_client.ble_write:
          id: chihiros_co2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            ESP_LOGI("co2", "RESET_SCHEMA (wis alle slots)");
            return chihiros::reset_schema(id(cmd_seq_co2)++);
      - delay: 200ms
      - ble_client.ble_write:
          id: chihiros_co2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t h = (uint8_t)id(co2_start_uur).state;
            uint8_t m = (uint8_t)id(co2_start_min).state;
            ESP_LOGI("co2", "Schema start=%02d:%02d → ON", h, m);
            return chihiros::co2_schema(h, m, chihiros::data::CO2_ON, id(cmd_seq_co2)++);
      - delay: 100ms
      - ble_client.ble_write:
          id: chihiros_co2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t h = (uint8_t)id(co2_eind_uur).state;
            uint8_t m = (uint8_t)id(co2_eind_min).state;
            ESP_LOGI("co2", "Schema eind=%02d:%02d → OFF", h, m);
            return chihiros::co2_schema(h, m, chihiros::data::CO2_OFF, id(cmd_seq_co2)++);
      - logger.log: "CO2 schema verstuurd"

  # Deactiveert schema — stuurt EMPTY voor beide slots.
  # Apparaat sluit klep direct na ontvangst.
  - id: deactiveer_schema
    then:
      - ble_client.ble_write:
          id: chihiros_co2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t h = (uint8_t)id(co2_start_uur).state;
            uint8_t m = (uint8_t)id(co2_start_min).state;
            ESP_LOGI("co2", "Deactiveer: start %02d:%02d → EMPTY", h, m);
            return chihiros::co2_schema(h, m, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
      - delay: 100ms
      - ble_client.ble_write:
          id: chihiros_co2
          service_uuid: ${ble_service}
          characteristic_uuid: ${ble_tx}
          value: !lambda |-
            uint8_t h = (uint8_t)id(co2_eind_uur).state;
            uint8_t m = (uint8_t)id(co2_eind_min).state;
            ESP_LOGI("co2", "Deactiveer: eind %02d:%02d → EMPTY", h, m);
            return chihiros::co2_schema(h, m, chihiros::data::CO2_EMPTY, id(cmd_seq_co2)++);
      - logger.log: "CO2 schema gedeactiveerd"

switch:
  - platform: ble_client
    ble_client_id: chihiros_co2
    id: co2_connect
    internal: true
    restore_mode: ALWAYS_ON

  - platform: template
    name: "CO2 schema actief"
    id: sw_co2_schema_actief
    icon: mdi:molecule-co2
    lambda: return id(co2_schema_actief);
    turn_on_action:
      - lambda: id(co2_schema_actief) = true;
      - if:
          condition:
            switch.is_on: co2_connect
          then:
            - script.execute: stuur_schema
    turn_off_action:
      - lambda: id(co2_schema_actief) = false;
      - if:
          condition:
            switch.is_on: co2_connect
          then:
            - script.execute: deactiveer_schema

button:
  - platform: template
    name: "CO2 schema versturen"
    id: btn_co2_schema
    icon: mdi:molecule-co2
    on_press:
      - if:
          condition:
            switch.is_on: co2_connect
          then:
            - script.execute: stuur_schema

  - platform: template
    name: "RTC sync"
    id: btn_rtc_sync
    icon: mdi:clock-sync
    on_press:
      - if:
          condition:
            switch.is_on: co2_connect
          then:
            - ble_client.ble_write:
                id: chihiros_co2
                service_uuid: ${ble_service}
                characteristic_uuid: ${ble_tx}
                value: !lambda |-
                  auto t = id(ha_time).now();
                  ESP_LOGI("co2", "RTC sync");
                  return chihiros::rtc_pakket(t, id(cmd_seq_co2)++);
      - if:
          condition:
            switch.is_on: roerder_verbinding
          then:
            - ble_client.ble_write:
                id: chihiros_roerder
                service_uuid: ${ble_service}
                characteristic_uuid: ${ble_tx}
                value: !lambda |-
                  auto t = id(ha_time).now();
                  ESP_LOGI("roerder", "RTC sync");
                  return chihiros::rtc_pakket(t, id(cmd_seq_roerder)++);

sensor:
  - platform: homeassistant
    id: co2_start_uur
    entity_id: input_datetime.aquarium_co2_start
    attribute: hour
  - platform: homeassistant
    id: co2_start_min
    entity_id: input_datetime.aquarium_co2_start
    attribute: minute
  - platform: homeassistant
    id: co2_eind_uur
    entity_id: input_datetime.aquarium_co2_eind
    attribute: hour
  - platform: homeassistant
    id: co2_eind_min
    entity_id: input_datetime.aquarium_co2_eind
    attribute: minute

  - platform: ble_client
    type: rssi
    ble_client_id: chihiros_co2
    name: "CO2 RSSI"
    update_interval: 30s

  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_co2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: co2_status_raw
    name: "CO2 Status"
    notify: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("co2", "Notificatie: %s", [&](){
        std::string s;
        for (auto b : x) { char buf[4]; snprintf(buf, sizeof(buf), "%02x ", b); s += buf; }
        return s;
      }().c_str());
      if (x.size() >= 7) return (float)x[6];
      return NAN;
