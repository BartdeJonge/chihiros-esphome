# --- DOSING PUMP ---
#
# Protocol afgeleid uit btsnoop HCI logs (2026-06-08):
#
# Connect:      auth(BASE,0x01) → RTC → RTC → auth_dose1(DEVICE,0x04) → auth_dose2(DEVICE,0x05)
# Schema:       STIR_ENABLE + STIR_SPEED + STIR_TIMER per pomp (zie helpers in chihiros_ble.h)
# Handmatig:    STIR_SPEED [pump_idx, 0x00, 0x00, 0x00, vol_01ml]
#
# Tijdcodering: uur gesplitst over STIR_TIMER[2]=uur>>1 en STIR_SPEED[2]=uur&1 (alle uren 0-23)
# Weekdays:     zelfde bitmask als WRGB2 — Ma=64 Di=32 Wo=16 Do=8 Vr=4 Za=2 Zo=1
# Disable:      STIR_ENABLE met enable=false (0x00)
#
# dosing_actieve_actie:
#   0 = schema update (alle 4 pompen)
#   1 = handmatige dosis (dosing_actieve_pomp)

globals:
  - id: dosing_device
    type: chihiros::DosingDevice
    restore_value: false

ble_client:
  - mac_address: ${dosing_mac}
    id: chihiros_dosing
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            bool    actief[]   = {id(sw_dosing_schema_p1).state, id(sw_dosing_schema_p2).state,
                                  id(sw_dosing_schema_p3).state, id(sw_dosing_schema_p4).state};
            uint8_t weekdays[] = {(uint8_t)id(num_dosing_weekdays_p1).state, (uint8_t)id(num_dosing_weekdays_p2).state,
                                  (uint8_t)id(num_dosing_weekdays_p3).state, (uint8_t)id(num_dosing_weekdays_p4).state};
            uint8_t uur[]      = {(uint8_t)id(num_dosing_hour_p1).state, (uint8_t)id(num_dosing_hour_p2).state,
                                  (uint8_t)id(num_dosing_hour_p3).state, (uint8_t)id(num_dosing_hour_p4).state};
            uint8_t min_[]     = {(uint8_t)id(num_dosing_min_p1).state, (uint8_t)id(num_dosing_min_p2).state,
                                  (uint8_t)id(num_dosing_min_p3).state, (uint8_t)id(num_dosing_min_p4).state};
            float   vol[]      = {id(num_dosing_vol_p1).state, id(num_dosing_vol_p2).state,
                                  id(num_dosing_vol_p3).state, id(num_dosing_vol_p4).state};
            id(dosing_device).prepare(
              id(ntp_tijd).now(), actief, weekdays, uur, min_, vol
            );
        - while:
            condition:
              lambda: return id(dosing_device).has_next();
            then:
              - ble_client.ble_write:
                  id: chihiros_dosing
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(dosing_device).next();
              - delay: 200ms
        - switch.turn_off: dosing_verbinding
        - logger.log: "dosing: klaar"
    on_disconnect:
      then:
        - logger.log: "dosing: verbinding verbroken"

script:
  - id: dosing_verbind_als_klaar
    then:
      - if:
          condition:
            lambda: return id(ha_verbonden);
          then:
            - switch.turn_on: dosing_verbinding

  - id: dosing_debounce
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: dosing_verbind_als_klaar


switch:
  - platform: ble_client
    ble_client_id: chihiros_dosing
    id: dosing_verbinding
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Dosing schema pomp 1"
    id: sw_dosing_schema_p1
    icon: mdi:calendar-clock
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      - script.execute: dosing_verbind_als_klaar
    on_turn_off:
      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing schema pomp 2"
    id: sw_dosing_schema_p2
    icon: mdi:calendar-clock
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    on_turn_on:
      - script.execute: dosing_verbind_als_klaar
    on_turn_off:
      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing schema pomp 3"
    id: sw_dosing_schema_p3
    icon: mdi:calendar-clock
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    on_turn_on:
      - script.execute: dosing_verbind_als_klaar
    on_turn_off:
      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing schema pomp 4"
    id: sw_dosing_schema_p4
    icon: mdi:calendar-clock
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    on_turn_on:
      - script.execute: dosing_verbind_als_klaar
    on_turn_off:
      - script.execute: dosing_verbind_als_klaar

button:
  - platform: template
    name: "Dosing pomp 1"
    id: btn_dosing_p1
    icon: mdi:eyedropper
    on_press:
      - lambda: id(dosing_device).set_manual_dose(0, (uint8_t)(id(num_dosing_vol_p1).state * 10.0f + 0.5f));
      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing pomp 2"
    id: btn_dosing_p2
    icon: mdi:eyedropper
    on_press:
      - lambda: id(dosing_device).set_manual_dose(1, (uint8_t)(id(num_dosing_vol_p2).state * 10.0f + 0.5f));
      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing pomp 3"
    id: btn_dosing_p3
    icon: mdi:eyedropper
    on_press:
