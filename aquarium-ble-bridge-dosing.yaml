      - script.execute: dosing_verbind_als_klaar

  - platform: template
    name: "Dosing pomp 4"
    id: btn_dosing_p4
    icon: mdi:eyedropper
    on_press:
      - lambda: id(dosing_device).set_manual_dose(3, (uint8_t)(id(num_dosing_vol_p4).state * 10.0f + 0.5f));
      - script.execute: dosing_verbind_als_klaar

number:
  # Volume per pomp (handmatig dosis + schema)
  - platform: template
    name: "Dosing pomp 1 volume"
    id: num_dosing_vol_p1
    min_value: 0.5
    max_value: 25.5
    step: 0.5
    initial_value: 1.0
    restore_value: true
    unit_of_measurement: "mL"
    optimistic: true
    icon: mdi:water
    on_value:
      - script.execute: dosing_debounce

  - platform: template
    name: "Dosing pomp 2 volume"
    id: num_dosing_vol_p2
    min_value: 0.5
    max_value: 25.5
    step: 0.5
    initial_value: 10.0
    restore_value: true
