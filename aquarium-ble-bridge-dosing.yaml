sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_dosing
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: dosing_notificatie
    name: "Dosing Notificatie"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("dosing", "Notificatie (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      return NAN;
